name: Proxy HA Image (gzip)

on:
  schedule:
    - cron: '0 3 * * *'  # Nightly at 3am UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull, flatten via export/import (strips xattrs), push
        run: |
          docker pull --platform linux/arm64 homeassistant/home-assistant:latest

          python3 << 'EOF'
          import subprocess, json

          config = json.loads(subprocess.check_output([
              'docker', 'inspect', 'homeassistant/home-assistant:latest'
          ]))[0]['Config']

          changes = []
          for env in (config.get('Env') or []):
              changes += ['--change', f'ENV {env}']
          if config.get('WorkingDir'):
              changes += ['--change', f'WORKDIR {config["WorkingDir"]}']
          if config.get('User'):
              changes += ['--change', f'USER {config["User"]}']
#          if config.get('Entrypoint'):
#              changes += ['--change', f'ENTRYPOINT {json.dumps(config["Entrypoint"])}']
          if config.get('Cmd'):
              changes += ['--change', f'CMD {json.dumps(config["Cmd"])}']
          for port in (config.get('ExposedPorts') or {}):
              changes += ['--change', f'EXPOSE {port}']

          subprocess.run(['docker', 'create', '--platform', 'linux/arm64', '--name', 'tmp_ha',
                          'homeassistant/home-assistant:latest'], check=True)

          export = subprocess.Popen(['docker', 'export', 'tmp_ha'], stdout=subprocess.PIPE)
          subprocess.run(['docker', 'import', '--platform','linux/arm64'] + changes + ['-', 'pcosway/home-assistant:latest'],
                         stdin=export.stdout, check=True)
          export.wait()
          subprocess.run(['docker', 'rm', 'tmp_ha'], check=True)
          print('Import complete')
          EOF

          docker push pcosway/home-assistant:latest
